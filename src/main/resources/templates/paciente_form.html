<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nuevo Paciente</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      min-height: 100vh;
    }

    .form-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .form-container {
      width: 100%;
      max-width: 500px;
    }

    .btn-cancelar {
      width: 100%;
    }

    @media (min-width: 576px) {
      .btn-cancelar {
        width: auto;
      }
    }
  </style>
</head>

<body class="bg-light">

  <div class="form-wrapper">
    <div class="form-container">
      <h2 class="text-primary mb-4">Registrar Paciente</h2>

      <form action="/pacientes/guardar" method="post">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre</label>
          <input type="text" id="nombre" name="nombre" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="cedula" class="form-label">Cédula</label>
          <input type="text" id="cedula" name="cedula" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Guardar</button>
      </form>

      <a href="/pacientes" class="btn btn-secondary mt-3 btn-cancelar">Volver</a>
    </div>
  </div>

  <!-- Modal de error -->
  <div class="modal fade" id="errorModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4">
        <h5 class="text-danger mb-0" th:text="${errorMsg}"></h5>
      </div>
    </div>
  </div>

  <!-- Script para mostrar modal si hay error -->
  <script th:inline="javascript">
    /*<![CDATA[*/
    const errorMsg = /*[[${errorMsg}]]*/ null;
    if (errorMsg) {
      const modal = new bootstrap.Modal(document.getElementById('errorModal'));
      modal.show();
      setTimeout(() => modal.hide(), 1000);
    }
    /*]]>*/
  </script>
</body>
</html>
