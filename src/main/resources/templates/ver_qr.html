<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>QR del Paciente</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="text-center bg-light mt-5">

<div class="container">
  <h3 th:text="'QR para el estudio del ' + ${#temporals.format(fecha, 'dd/MM/yyyy')}"></h3>
  <h4 th:text="${paciente.nombre}"></h4>

  <div class="alert alert-warning mt-4" role="alert" th:if="${msg != null}" th:text="${msg}"></div>

  <div class="mt-3">
    <a th:href="@{'/pacientes/' + ${paciente.id} + '/imagenes'}" class="btn btn-secondary">Volver</a>
  </div>
</div>

</body>
</html>
