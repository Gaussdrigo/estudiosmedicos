<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Imágenes del Paciente</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <style>
    .page-container {
      padding-top: 24px;
      padding-bottom: 24px;
    }

    .upload-form {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 2rem auto;
    }

    .galeria-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      justify-items: center;
    }

    .galeria-grid .card {
      width: 100%;
      max-width: 300px;
    }

    .card-img-top {
      object-fit: cover;
      width: 100%;
      height: auto;
      border-radius: 4px 4px 0 0;
    }

    @media (max-width: 576px) {
      .page-title {
        font-size: 1.5rem;
      }

      .fecha-header {
        flex-direction: column;
        align-items: stretch !important;
        gap: 10px;
      }

      .fecha-header h4 {
        margin-bottom: 0;
      }

      .btn-mobile-full {
        width: 100%;
      }

      .galeria-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="bg-light">

  <div class="container page-container text-center">
    <h2 class="page-title mb-4" th:text="'Imágenes de ' + ${paciente.nombre}"></h2>

    <!-- Formulario de subida -->
    <form th:action="@{'/pacientes/' + ${paciente.id} + '/imagenes/subir'}"
          method="post"
          enctype="multipart/form-data"
          class="upload-form">
      <input type="file" name="imagen" accept=".jpg" class="form-control mb-2" required>
      <button type="submit" class="btn btn-success w-100">Subir Imagen</button>
    </form>

    <div th:each="entry : ${imagenesPorFecha}" class="mb-5">

      <div class="d-flex justify-content-between align-items-center mb-3 fecha-header">
        <!-- Fecha -->
        <h4 class="text-primary text-center"
            th:text="${#temporals.format(entry.key, 'dd/MM/yyyy')}"></h4>

        <!-- Botón QR -->
        <a th:href="@{'/pacientes/' + ${paciente.id} + '/qr'(fecha=${entry.key})}"
           class="btn btn-outline-success btn-sm btn-mobile-full">
          Generar QR
        </a>
      </div>

      <div class="galeria-grid">
        <div class="card shadow-sm" th:each="img : ${entry.value}">
          <img th:src="${img.urlAcceso}" class="card-img-top">
          <div class="card-body p-2">
            <p class="small text-muted mb-0" th:text="${img.nombreArchivo}"></p>
          </div>
        </div>
      </div>

    </div>

    <a href="/pacientes" class="btn btn-secondary mt-4 btn-mobile-full">Volver</a>
  </div>

</body>
</html>
