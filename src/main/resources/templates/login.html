<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Estudios Médicos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <style>
    body {
      min-height: 100vh;
    }

    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
    }

    #msg {
      min-height: 24px;
    }
  </style>
</head>
<body class="bg-light">

  <div class="login-wrapper">
    <div class="login-container">
      <h3 class="text-center mb-4">Iniciar Sesión</h3>

      <div class="card p-4 shadow-sm">
        <form id="formLogin">
          <div class="mb-3">
            <label for="nombre" class="form-label">Usuario</label>
            <input type="text" id="nombre" class="form-control" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
      </div>

      <div id="msg" class="text-center mt-3"></div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $("#formLogin").on("submit", function(e) {
      e.preventDefault();

      $.ajax({
        url: "/auth-login",
        type: "POST",
        data: {
          nombre: $("#nombre").val(),
          password: $("#password").val()
        },
        success: function(resp) {
          if (resp === "OK") {
            $("#msg").text("Inicio de sesión exitoso ✅").removeClass("text-danger").addClass("text-success");
            window.location.href = "/home";
          } else {
            $("#msg").text("Usuario o contraseña incorrectos ❌").removeClass("text-success").addClass("text-danger");
          }
        },
        error: function() {
          $("#msg").text("Error en el servidor").removeClass("text-success").addClass("text-danger");
        }
      });
    });
  </script>
</body>
</html>
