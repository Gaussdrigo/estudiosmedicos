<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pacientes</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .page-container {
      padding-top: 24px;
      padding-bottom: 24px;
    }

    .buscador-container {
      width: 100%;
      max-width: 400px;
    }

    @media (max-width: 576px) {
      h2 {
        font-size: 1.5rem;
      }

      .btn-mobile-full {
        width: 100%;
      }

      .table td,
      .table th {
        white-space: nowrap;
      }
    }
  </style>
</head>
<body class="bg-light">

  <div class="container page-container">
    <h2 class="mb-4">Listado de Pacientes</h2>

    <a href="/pacientes/nuevo" class="btn btn-success mb-3 btn-mobile-full">
      ➕ Registrar Nuevo Paciente
    </a>

    <!-- Campo de búsqueda -->
    <div class="input-group mb-3 buscador-container">
      <span class="input-group-text">🔍 Buscar</span>
      <input id="filtroPacientes" type="text" class="form-control" placeholder="Buscar por nombre o cédula...">
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-striped text-center align-middle">
        <thead class="table-dark">
          <tr>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Imágenes</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${pacientes}">
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.cedula}"></td>

            <td>
              <a th:href="@{'/pacientes/' + ${p.id} + '/imagenes'}" class="btn btn-info btn-sm">
                Ver Fotos
              </a>
            </td>

            <td>
              <button type="button"
                      class="btn btn-danger btn-sm"
                      data-bs-toggle="modal"
                      data-bs-target="#modalEliminar"
                      th:attr="data-id=${p.id}, data-nombre=${p.nombre}">
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Mensaje de confirmación -->
    <div th:if="${msg}" id="alertMsg" class="alert alert-info text-center mt-3" th:text="${msg}"></div>

    <a href="/home" class="btn btn-secondary mt-3 btn-mobile-full">🔙 Volver al Inicio</a>
  </div>

  <!-- Modal global de confirmación -->
  <div class="modal fade" id="modalEliminar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4">
        <h5 class="text-danger mb-3">
          ¿Seguro que deseas eliminar a <span id="nombrePacienteModal"></span>?
        </h5>
        <div class="mt-3 d-flex justify-content-center gap-2 flex-wrap">
          <form id="formEliminarPaciente" method="post">
            <button type="submit" class="btn btn-danger">Sí, eliminar</button>
          </form>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('filtroPacientes').addEventListener('input', function() {
      const filtro = this.value.toLowerCase();
      const filas = document.querySelectorAll('tbody tr');

      filas.forEach(fila => {
        const nombre = fila.children[0].textContent.toLowerCase();
        const cedula = fila.children[1].textContent.toLowerCase();
        if (nombre.includes(filtro) || cedula.includes(filtro)) {
          fila.style.display = '';
        } else {
          fila.style.display = 'none';
        }
      });
    });

    const modalEliminar = document.getElementById('modalEliminar');

    modalEliminar.addEventListener('show.bs.modal', function(event) {
      const boton = event.relatedTarget;
      const id = boton.getAttribute('data-id');
      const nombre = boton.getAttribute('data-nombre');

      document.getElementById('nombrePacienteModal').textContent = nombre;
      document.getElementById('formEliminarPaciente').action = '/pacientes/' + id + '/eliminar';
    });
  
     const alertMsg = document.getElementById('alertMsg');
    if (alertMsg) {
      setTimeout(() => {
        alertMsg.style.transition = "opacity 0.5s ease";
        alertMsg.style.opacity = "0";

        setTimeout(() => {
          alertMsg.remove();
        }, 500);
      }, 1000); // 1 segundo
    }
  </script>
</body>
</html>
